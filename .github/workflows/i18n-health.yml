name: i18n health

on:
  push:
    paths:
      - ".github/workflows/i18n-health.yml"
      - "Makefile"
      - "cmd/i18n/**"
      - "go.mod"
      - "go.sum"
      - "i18n/**"
      - "internal/i18n/**"
      - "lefthook.yml"
      - "templates/**"
      - "**/*.go"
  pull_request:
    paths:
      - ".github/workflows/i18n-health.yml"
      - "Makefile"
      - "cmd/i18n/**"
      - "go.mod"
      - "go.sum"
      - "i18n/**"
      - "internal/i18n/**"
      - "lefthook.yml"
      - "templates/**"
      - "**/*.go"

permissions:
  contents: read

jobs:
  i18n-health:
    name: i18n health
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Check translations
        run: |
          nix develop --command make i18n-health
